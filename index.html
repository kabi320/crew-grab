<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ecrew Grab Pro</title>
    <style>
        :root { --blue: #007AFF; --orange: #FF9500; --bg: #F2F2F7; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1C1C1E; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; text-align: center; }
        h1 { font-size: 24px; margin: 10px 0; }
        input, select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 10px; border: 1px solid #DDD; font-size: 16px; }
        .btn-primary { background: var(--blue); color: white; border: none; font-weight: bold; }
        .btn-sync { background: var(--orange); color: white; border: none; font-weight: bold; margin-top: 20px; display: none; }
        #logStatus { font-size: 12px; color: #8E8E93; margin-top: 10px; }
        .flight-item { background: #FFF; border-bottom: 1px solid #EEE; padding: 15px; display: flex; align-items: center; text-align: left; }
        .flight-info { flex-grow: 1; margin-left: 10px; }
        .flight-date { font-weight: bold; }
        .flight-route { font-size: 14px; color: #666; }
        .flight-time { font-family: monospace; color: var(--blue); font-size: 12px; }
    </style>
</head>
<body>

    <div class="card">
        <div style="font-size: 50px;">✈️</div>
        <h1>Ecrew Grab Pro</h1>
        <div style="display: flex; gap: 10px; align-items: center;">
            <label>Airline:</label>
            <input type="text" id="prefix" value="UO" style="width: 60px; text-transform: uppercase;">
        </div>
        <input type="file" id="fileInput" accept=".txt,.text">
        <div id="logStatus">Ready to parse...</div>
    </div>

    <div id="flightList"></div>
    <button id="syncBtn" class="btn-sync" onclick="exportToLogTen()">Sync to LogTen Pro</button>

    <script>
        let flights = [];
        const fileInput = document.getElementById('fileInput');
        
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => parseText(event.target.result);
            reader.readAsText(file);
        });

        function parseText(text) {
            const rows = text.split('\n');
            const prefix = document.getElementById('prefix').value.toUpperCase();
            flights = [];
            let activeDate = "";

            rows.forEach(row => {
                const line = row.trim();
                if (!line || line.includes("OFF") || line.includes("DO")) return;

                const dateMatch = line.match(/\d{2}\/\d{2}\/\d{4}/);
                if (dateMatch) activeDate = dateMatch[0];

                const flightMatch = line.match(/\b\d{3,4}\b(?=\s*\[)/);
                const routeMatch = line.match(/([A-Z]{3})\s*-\s*([A-Z]{3})/);
                const timeMatches = line.match(/\d{2}:\d{2}/g);

                if (flightMatch && routeMatch && activeDate) {
                    flights.push({
                        date: activeDate,
                        flightNum: prefix + flightMatch[0],
                        origin: routeMatch[1],
                        destination: routeMatch[2],
                        outTime: timeMatches ? timeMatches[1] : "00:00",
                        inTime: timeMatches ? timeMatches[2] : "00:00",
                        type: line.includes("POS") || line.includes("DH") ? 1 : 0
                    });
                }
            });

            renderFlights();
        }

        function renderFlights() {
            const list = document.getElementById('flightList');
            list.innerHTML = flights.map((f, i) => `
                <div class="flight-item">
                    <input type="checkbox" checked onchange="flights[${i}].selected = this.checked">
                    <div class="flight-info">
                        <div class="flight-date">${f.date} | ${f.flightNum}</div>
                        <div class="flight-route">${f.origin} ✈️ ${f.destination}</div>
                        <div class="flight-time">${f.outTime} - ${f.inTime}</div>
                    </div>
                </div>
            `).join('');
            document.getElementById('logStatus').innerText = `Found ${flights.length} sectors.`;
            document.getElementById('syncBtn').style.display = flights.length > 0 ? 'block' : 'none';
        }

        function exportToLogTen() {
            const selected = flights.filter(f => f.selected !== false);
            const entities = selected.map(f => ({
                entity_name: "Flight",
                flight_flightDate: f.date,
                flight_flightNumber: f.flightNum,
                flight_from: f.origin,
                flight_to: f.destination,
                flight_type: f.type,
                flight_scheduledDepartureTime: `${f.date} ${f.outTime}`,
                flight_scheduledArrivalTime: `${f.date} ${f.inTime}`
            }));

            const package = {
                metadata: { application: "Ecrew Grab Web", version: "1.0", dateFormat: "dd/MM/yyyy", dateAndTimeFormat: "dd/MM/yyyy HH:mm", timesAreZulu: true },
                entities: entities
            };

            const jsonStr = JSON.stringify(package);
            const url = `logten://v2/addEntities?package=${encodeURIComponent(jsonStr)}`;
            window.location.href = url;
        }
    </script>
</body>
</html>
